:root{

*{box-sizing:border-box;margin:0;padding:0;user-select:none;-webkit-tap-highlight-color:transparent;}

body{background:var(--bg);font-family:'Inter',system-ui,sans-serif;color:var(--ivory);display:flex;flex-direction:column;}

footer{font-size:9px;color:var(--ivdim);text-align:center;opacity:.3;letter-spacing:.08em;padding-bottom:4px;}

<script>
(function(){
'use strict';

// ── STORAGE ───────────────────────────────────────────────────────────────
const BAL_KEY='nrc_balance',STATS_KEY='nrc_stats',INIT=100000;
const getBal=()=>parseInt(localStorage.getItem(BAL_KEY))||0;
function ensureInit(){if(!localStorage.getItem('nrc_initialized')){localStorage.setItem(BAL_KEY,INIT);localStorage.setItem('nrc_usd','1000');localStorage.setItem('nrc_initialized','1');}}
const setBal=n=>{localStorage.setItem(BAL_KEY,Math.max(0,Math.floor(n)));renderBal();};
const getStats=()=>{try{return JSON.parse(localStorage.getItem(STATS_KEY))||{spins:0,wins:0,loss:0};}catch(e){return{spins:0,wins:0,loss:0};}};
const addStat=(w,l)=>{const s=getStats();s.spins++;s.wins+=w;s.loss+=l;localStorage.setItem(STATS_KEY,JSON.stringify(s));};
function trackMission(key,inc=1){const m=JSON.parse(localStorage.getItem('nrc_missions')||'{}');m[key]=(m[key]||0)+inc;localStorage.setItem('nrc_missions',JSON.stringify(m));}
const fmt=n=>Math.floor(n).toLocaleString('tr-TR');

// ── MULTIPLIER TABLES (Stake.com benzeri gerçekçi değerler) ───────────────
// Her rows için bucket sayısı = rows + 1
// Simetrik tablo — ortada düşük, kenarda yüksek
const MULT_TABLES = {
  8: {
    low:  [5.6, 2.1, 1.1, 1.0, 0.5, 1.0, 1.1, 2.1, 5.6],
    med:  [13,  3,   1.3, 0.7, 0.4, 0.7, 1.3, 3,   13],
    high: [29,  4,   1.5, 0.3, 0.2, 0.3, 1.5, 4,   29],
  },
  12: {
    low:  [8.9, 3,   1.4, 1.1, 1.0, 0.5, 0.5, 1.0, 1.1, 1.4, 3,   8.9],
    med:  [24,  6,   2,   1.4, 0.6, 0.4, 0.4, 0.6, 1.4, 2,   6,   24],
    high: [88,  10,  3,   1.4, 0.4, 0.2, 0.2, 0.4, 1.4, 3,   10,  88],
  },
  16: {
    low:  [16,  9,   2,   1.4, 1.4, 1.2, 1.1, 1.0, 0.5, 1.0, 1.1, 1.2, 1.4, 1.4, 2,   9,   16],
    med:  [110, 41,  10,  5,   3,   1.5, 1.0, 0.5, 0.3, 0.5, 1.0, 1.5, 3,   5,   10,  41,  110],
    high: [1000,130, 26,  9,   4,   2,   0.7, 0.2, 0.2, 0.2, 0.7, 2,   4,   9,   26,  130, 1000],
  },
};

// Bucket renkleri — ortadan kenara kırmızı→yeşil
function getBucketColor(idx, total, risk){
  const center = (total-1)/2;
  const dist = Math.abs(idx - center) / center; // 0=center, 1=edge
  if(risk==='low'){
    const r=Math.floor(dist*180+75);
    const g=Math.floor((1-dist)*200+55);
    return `rgb(${r},${g},50)`;
  } else if(risk==='med'){
    if(dist<0.3) return '#ff5722';
    if(dist<0.6) return '#ff9800';
    return '#4caf50';
  } else {
    if(dist<0.2) return '#ff1744';
    if(dist<0.4) return '#ff6d00';
    if(dist<0.7) return '#ffd700';
    return '#00e676';
  }
}

// ── CANVAS ────────────────────────────────────────────────────────────────
const canvas = document.getElementById('plinkoCanvas');
const ctx = canvas.getContext('2d');
let W, H;
let numRows = 8;
let risk = 'low';
let betAmt = 100;

function resize(){
  const wrap = document.getElementById('boardWrap');
  W = wrap.clientWidth - 16;
  canvas.width = W;
  canvas.height = Math.min(W * 1.15, 420);
  H = canvas.height;
  drawBoard([]);
}
window.addEventListener('resize', ()=>{ resize(); });

// ── PIN POSITIONS ─────────────────────────────────────────────────────────
function getPins(){
  const pins = [];
  const padX = W * 0.06;
  const padTop = H * 0.04;
  const padBot = H * 0.14; // space for buckets
  const usableH = H - padTop - padBot;
  const usableW = W - padX * 2;

  for(let row = 0; row < numRows; row++){
    const cols = row + 3;
    const spacingX = usableW / (cols - 1);
    const y = padTop + (usableH / (numRows - 1)) * row;
    for(let col = 0; col < cols; col++){
      const x = (W - spacingX * (cols - 1)) / 2 + col * spacingX;
      pins.push({x, y, row, col});
    }
  }
  return pins;
}

// ── BUCKET POSITIONS ─────────────────────────────────────────────────────
function getBuckets(){
  const mults = MULT_TABLES[numRows][risk];
  const count = mults.length; // numRows + 1
  const bw = W / count;
  const by = H - H * 0.12;
  const bh = H * 0.1;
  return mults.map((m, i) => ({
    x: i * bw,
    y: by,
    w: bw,
    h: bh,
    mult: m,
    color: getBucketColor(i, count, risk),
    lit: false,
    litT: 0,
  }));
}

let buckets = [];

// ── DRAW BOARD ────────────────────────────────────────────────────────────
function drawBoard(balls){
  ctx.clearRect(0, 0, W, H);

  // Background
  const bg = ctx.createLinearGradient(0, 0, 0, H);
  bg.addColorStop(0, '#0a0428');
  bg.addColorStop(1, '#060214');
  ctx.fillStyle = bg;
  ctx.fillRect(0, 0, W, H);

  // Pins
  const pins = getPins();
  const PIN_R = Math.max(3, W * 0.012);
  for(const p of pins){
    // Glow
    const grd = ctx.createRadialGradient(p.x, p.y, 0, p.x, p.y, PIN_R * 2.5);
    grd.addColorStop(0, 'rgba(0,229,255,0.3)');
    grd.addColorStop(1, 'transparent');
    ctx.beginPath();
    ctx.arc(p.x, p.y, PIN_R * 2.5, 0, Math.PI * 2);
    ctx.fillStyle = grd;
    ctx.fill();
    // Pin
    ctx.beginPath();
    ctx.arc(p.x, p.y, PIN_R, 0, Math.PI * 2);
    ctx.fillStyle = '#00e5ff';
    ctx.fill();
  }

  // Buckets
  buckets = getBuckets();
  const now = performance.now();
  for(const b of buckets){
    const age = now - b.litT;
    const litAlpha = b.lit ? Math.max(0, 1 - age / 400) : 0;
    if(litAlpha <= 0) b.lit = false;

    // Bucket bg
    ctx.fillStyle = b.color + (litAlpha > 0 ? 'ff' : '33');
    ctx.beginPath();
    ctx.roundRect(b.x + 1, b.y, b.w - 2, b.h, 4);
    ctx.fill();

    // Lit glow
    if(litAlpha > 0){
      ctx.fillStyle = b.color + Math.floor(litAlpha * 80).toString(16).padStart(2,'0');
      ctx.beginPath();
      ctx.roundRect(b.x + 1, b.y - 10, b.w - 2, b.h + 10, 4);
      ctx.fill();
    }

    // Multiplier text
    ctx.fillStyle = litAlpha > 0 ? '#fff' : b.color;
    ctx.font = `bold ${Math.max(7, W * 0.028)}px Orbitron,monospace`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.shadowColor = litAlpha > 0 ? '#fff' : b.color;
    ctx.shadowBlur = litAlpha > 0 ? 8 : 3;
    const label = b.mult >= 100 ? b.mult + '×' : b.mult + '×';
    ctx.fillText(label, b.x + b.w/2, b.y + b.h/2);
    ctx.shadowBlur = 0;
  }

  // Balls
  for(const b of balls) drawBall(b);
}

function drawBall(b){
  const BALL_R = Math.max(5, W * 0.018);
  const bx = b.x, by = b.y;

  // Shadow
  ctx.beginPath();
  ctx.arc(bx + 2, by + 2, BALL_R * 1.1, 0, Math.PI * 2);
  ctx.fillStyle = 'rgba(0,0,0,.5)';
  ctx.fill();

  // Trail
  if(b.trail && b.trail.length > 1){
    for(let i = 1; i < b.trail.length; i++){
      const alpha = (i / b.trail.length) * 0.3;
      ctx.beginPath();
      ctx.arc(b.trail[i].x, b.trail[i].y, BALL_R * (i/b.trail.length) * 0.8, 0, Math.PI*2);
      ctx.fillStyle = `rgba(0,229,255,${alpha})`;
      ctx.fill();
    }
  }

  // Ball
  const g = ctx.createRadialGradient(bx - BALL_R*.35, by - BALL_R*.4, BALL_R*.04, bx, by, BALL_R);
  g.addColorStop(0, '#ffffff');
  g.addColorStop(.4, '#c0d8ff');
  g.addColorStop(1, '#304060');
  ctx.beginPath();
  ctx.arc(bx, by, BALL_R, 0, Math.PI * 2);
  ctx.shadowColor = 'rgba(0,229,255,.6)';
  ctx.shadowBlur = 8;
  ctx.fillStyle = g;
  ctx.fill();
  ctx.shadowBlur = 0;

  // Specular
  ctx.beginPath();
  ctx.arc(bx - BALL_R*.28, by - BALL_R*.32, BALL_R*.2, 0, Math.PI * 2);
  ctx.fillStyle = 'rgba(255,255,255,.8)';
  ctx.fill();
}

// ── DETERMINISTIC PATH (key innovation) ──────────────────────────────────
// Top'un hangi bucket'a düşeceğini önceden hesapla
// Her pin'de ya sola ya sağa gider — gerçek plinko fiziği
// Ama path'i önceden belirle, sonra animasyonla göster
function calcPath(startCol, numRows){
  // startCol = başlangıç noktası (en üst sıra, ortaya yakın)
  // Her sırada bir adım sola veya sağa
  let col = startCol; // float — ortadan başla
  const path = [{row: -1, col: col}];

  for(let row = 0; row < numRows; row++){
    // Gerçek randomness — ama hafif orta ağırlık
    const goRight = Math.random() < 0.5;
    if(goRight) col += 1;
    // col artık 0..row+2 arasında
    path.push({row, col});
  }

  // Final bucket index = col (0..numRows dahil)
  const bucketIdx = Math.round(col);
  return {path, bucketIdx: Math.min(numRows, Math.max(0, bucketIdx))};
}

// ── ANIMATION ─────────────────────────────────────────────────────────────
let activeBalls = [];
let animId = null;
let isDropping = false;
const BALL_R_BASE = () => Math.max(5, W * 0.018);

function dropBall(bet){
  const pins = getPins();
  const BALL_R = BALL_R_BASE();

  // Calculate path first
  const {path, bucketIdx} = calcPath(0, numRows);

  // Convert path to world coordinates
  // row=-1 is above board, row 0..numRows-1 are pin rows
  const padX = W * 0.06;
  const padTop = H * 0.04;
  const padBot = H * 0.14;
  const usableH = H - padTop - padBot;
  const usableW = W - padX * 2;

  function pinXY(row, col){
    const cols = row + 3;
    const spacingX = usableW / (cols - 1);
    const x = (W - spacingX * (cols - 1)) / 2 + col * spacingX;
    const y = padTop + (usableH / (numRows - 1)) * row;
    return {x, y};
  }

  // Build waypoints
  const waypoints = [];

  // Start: above first row, centered
  waypoints.push({x: W/2 + (Math.random()-0.5)*4, y: padTop - BALL_R * 2});

  // Each step: between two pins
  for(let i = 0; i < path.length - 1; i++){
    const curr = path[i];
    const next = path[i+1];

    if(next.row >= 0 && next.row < numRows){
      const pos = pinXY(next.row, next.col);
      // Add slight random offset to avoid perfectly straight lines
      waypoints.push({
        x: pos.x + (Math.random()-0.5)*6,
        y: pos.y + BALL_R * 1.5
      });
    }
  }

  // Final: bucket center
  const bk = getBuckets()[bucketIdx];
  waypoints.push({x: bk.x + bk.w/2, y: bk.y + bk.h/2});

  const ball = {
    x: waypoints[0].x,
    y: waypoints[0].y,
    waypoints,
    wpIdx: 0,
    progress: 0,
    speed: 0,
    r: BALL_R,
    bet,
    bucketIdx,
    done: false,
    trail: [],
  };

  activeBalls.push(ball);
  if(!animId) animId = requestAnimationFrame(physicsLoop);
}

const GRAVITY_PER_MS = 0.0006; // acceleration
const MAX_SPEED = 0.018; // max progress per ms

function physicsLoop(now){
  let hasActive = false;
  const dt = 16; // ~60fps

  for(const b of activeBalls){
    if(b.done) continue;
    hasActive = true;

    // Accelerate toward next waypoint
    b.speed = Math.min(MAX_SPEED, b.speed + GRAVITY_PER_MS * dt);
    b.progress += b.speed * dt;

    if(b.progress >= 1){
      b.wpIdx++;
      b.progress = 0;
      // Slow down on pin hit
      b.speed *= 0.6;
      playPinSound();

      if(b.wpIdx >= b.waypoints.length - 1){
        // Reached bucket
        const bk = getBuckets()[b.bucketIdx];
        b.x = bk.x + bk.w/2;
        b.y = bk.y + bk.h/2;
        b.done = true;

        // Light up bucket
        if(buckets[b.bucketIdx]){
          buckets[b.bucketIdx].lit = true;
          buckets[b.bucketIdx].litT = performance.now();
        }

        // Calculate result
        const mult = MULT_TABLES[numRows][risk][b.bucketIdx] || 0;
        const win = Math.floor(b.bet * mult);
        const profit = win - b.bet;

        if(profit > 0){
          setBal(getBal() + win);
          addStat(profit, 0);
          setMsg(`${mult}× — +${fmt(profit)} NRC`, '+'+fmt(profit)+' NRC');
          playWin(profit);
        } else if(win === b.bet){
          setBal(getBal() + win);
          setMsg(`${mult}× — Baş başa`, '');
        } else {
          setBal(getBal() + win);
          addStat(0, b.bet - win);
          setMsg(`${mult}× — −${fmt(b.bet - win)} NRC`, '');
          playLose();
        }

        localStorage.setItem('nrc_last_result', JSON.stringify({win:profit>0?profit:0,ts:Date.now()}));
        pushHistory(mult, profit);
        renderStats();

        setTimeout(()=>{
          activeBalls = activeBalls.filter(x=>x!==b);
          if(activeBalls.length===0){
            isDropping = false;
            document.getElementById('dropBtn').disabled = false;
            cancelAnimationFrame(animId);
            animId = null;
          }
        }, 800);
        continue;
      }
    }

    // Interpolate position
    const curr = b.waypoints[b.wpIdx];
    const next = b.waypoints[Math.min(b.wpIdx+1, b.waypoints.length-1)];
    const ease = b.progress * b.progress * (3 - 2 * b.progress); // smoothstep
    b.x = curr.x + (next.x - curr.x) * ease;
    b.y = curr.y + (next.y - curr.y) * ease;

    // Trail
    b.trail.push({x:b.x, y:b.y});
    if(b.trail.length > 6) b.trail.shift();
  }

  drawBoard(activeBalls);
  if(hasActive) animId = requestAnimationFrame(physicsLoop);
}

// ── HISTORY ───────────────────────────────────────────────────────────────
let history = [];
function pushHistory(mult, profit){
  history.unshift({mult, profit});
  if(history.length > 12) history.pop();
  const row = document.getElementById('histRow');
  row.innerHTML = history.map(h=>{
    const col = h.profit > 0 ? '#00e676' : h.profit === 0 ? '#ffd700' : '#ff5722';
    return `<div class="hr-dot" style="background:${col}22;border:1px solid ${col}66;color:${col};">${h.mult}×</div>`;
  }).join('');
}

// ── SOUNDS ────────────────────────────────────────────────────────────────
let ac;
const getAC=()=>{if(!ac)ac=new(window.AudioContext||window.webkitAudioContext)();return ac;};
let lastPin=0;
function playPinSound(){
  const now=Date.now();if(now-lastPin<60)return;lastPin=now;
  try{const a=getAC(),o=a.createOscillator(),g=a.createGain();
  o.connect(g);g.connect(a.destination);o.type='sine';
  o.frequency.value=500+Math.random()*300;
  g.gain.setValueAtTime(.07,a.currentTime);
  g.gain.exponentialRampToValueAtTime(.001,a.currentTime+.05);
  o.start();o.stop(a.currentTime+.06);}catch(e){}
}
function playWin(amt){
  try{const a=getAC();
  const fs=amt>10000?[523,659,784,1047,1319]:[523,659,784,1047];
  fs.forEach((f,i)=>{const o=a.createOscillator(),g=a.createGain();
  o.connect(g);g.connect(a.destination);o.type='square';o.frequency.value=f;
  g.gain.setValueAtTime(.15,a.currentTime+i*.08);
  g.gain.exponentialRampToValueAtTime(.001,a.currentTime+i*.08+.15);
  o.start(a.currentTime+i*.08);o.stop(a.currentTime+i*.08+.2);});}catch(e){}
}
function playLose(){
  try{const a=getAC(),o=a.createOscillator(),g=a.createGain();
  o.connect(g);g.connect(a.destination);o.type='sawtooth';o.frequency.value=180;
  g.gain.setValueAtTime(.08,a.currentTime);g.gain.exponentialRampToValueAtTime(.001,a.currentTime+.2);
  o.start();o.stop(a.currentTime+.2);}catch(e){}
}

// ── UI ────────────────────────────────────────────────────────────────────
const BET_STEPS=[50,100,250,500,1000,2500,5000];
function renderBal(){document.getElementById('hBal').textContent=fmt(getBal())+' NRC';}
function setMsg(m,a){document.getElementById('winMsg').textContent=m;document.getElementById('winAmt').textContent=a;}
function renderBet(){
  document.getElementById('bVal').textContent=fmt(betAmt);
  document.getElementById('totalBet').textContent=fmt(betAmt)+' NRC';
}
function renderStats(){
  const s=getStats();
  document.getElementById('stD').textContent=fmt(s.spins);
  document.getElementById('stW').textContent='+'+fmt(s.wins);
  const net=s.wins-s.loss;
  const el=document.getElementById('stN');
  el.textContent=(net>=0?'+':'')+fmt(net);
  el.className='sv '+(net>0?'pos':net<0?'neg':'');
}

// ── EVENTS ────────────────────────────────────────────────────────────────
document.getElementById('bMinus').addEventListener('click',()=>{
  const i=BET_STEPS.indexOf(betAmt);if(i>0)betAmt=BET_STEPS[i-1];renderBet();
});
document.getElementById('bPlus').addEventListener('click',()=>{
  const i=BET_STEPS.indexOf(betAmt);if(i>=0&&i<BET_STEPS.length-1)betAmt=BET_STEPS[i+1];renderBet();
});
document.querySelectorAll('.chip').forEach(btn=>{
  btn.addEventListener('click',()=>{betAmt=parseInt(btn.dataset.v);renderBet();});
});
document.querySelectorAll('.risk-btn').forEach(btn=>{
  btn.addEventListener('click',()=>{
    risk=btn.dataset.r;
    document.querySelectorAll('.risk-btn').forEach(b=>b.classList.remove('sel'));
    btn.classList.add('sel');
    drawBoard([]);
  });
});
document.querySelectorAll('.rows-btn').forEach(btn=>{
  btn.addEventListener('click',()=>{
    numRows=parseInt(btn.dataset.rows);
    document.querySelectorAll('.rows-btn').forEach(b=>b.classList.remove('sel'));
    btn.classList.add('sel');
    resize();
  });
});
document.getElementById('dropBtn').addEventListener('click',()=>{
  const bal=getBal();
  if(betAmt>bal){setMsg('Yetersiz bakiye!','');return;}
  setBal(bal-betAmt);
  isDropping=true;
  if(risk==='high') trackMission('plinko_high');
  document.getElementById('dropBtn').disabled=true;
  dropBall(betAmt);
  setMsg('Top düşüyor...','');
});

// ── INIT ──────────────────────────────────────────────────────────────────
resize();
renderBal();
renderBet();
renderStats();

})();
</script>
