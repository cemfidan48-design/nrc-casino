<head>

<style>
:root{--bg:#08081a;--panel:#10102a;--cyan:#00e5ff;--pink:#e040fb;--gold:#ffd700;--green:#00e676;--red:#ff1744;--ivory:#f0e6ff;--ivdim:#6a6a8a;}
*{box-sizing:border-box;margin:0;padding:0;user-select:none;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;overflow:hidden;}
body{background:var(--bg);font-family:'Inter',system-ui,sans-serif;color:var(--ivory);display:flex;flex-direction:column;}
.page{flex:1;overflow-y:auto;padding-bottom:80px;}
.inner{max-width:480px;margin:0 auto;padding:0 12px;}
.nav{position:fixed;bottom:0;left:0;right:0;height:60px;background:rgba(8,8,26,.96);border-top:1px solid rgba(0,229,255,.15);display:flex;align-items:center;justify-content:space-around;z-index:100;padding-bottom:env(safe-area-inset-bottom);backdrop-filter:blur(20px);}
.ni{display:flex;flex-direction:column;align-items:center;gap:2px;padding:6px 4px;flex:1;text-decoration:none;}
.ni-icon{font-size:20px;line-height:1;}
.ni-lbl{font-size:8px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:#6a6a8a;}
.ni.active .ni-lbl{color:#00e5ff;}
.ni.active .ni-icon{filter:drop-shadow(0 0 6px #00e5ff);transform:scale(1.1);}
.hdr{padding:14px 0 10px;display:flex;justify-content:space-between;align-items:center;}
.gtitle{font-family:'Orbitron',monospace;font-size:18px;font-weight:900;letter-spacing:.1em;background:linear-gradient(135deg,#00e5ff,#00b8d4);-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.bchip{background:rgba(255,215,0,.1);border:1px solid rgba(255,215,0,.3);border-radius:20px;padding:6px 12px;font-family:'Orbitron',monospace;font-size:12px;font-weight:700;color:var(--gold);}
.stage{position:relative;width:100%;max-width:300px;margin:0 auto 12px;aspect-ratio:1/1;}
.stage::before{content:'';position:absolute;inset:-4px;border-radius:50%;background:conic-gradient(#00e5ff,#e040fb,#ffd700,#00e5ff);z-index:0;animation:rimSpin 8s linear infinite;}
@keyframes rimSpin{to{transform:rotate(360deg);}}
.stage::after{content:'';position:absolute;inset:0;border-radius:50%;box-shadow:0 0 0 4px var(--bg),0 0 30px rgba(0,229,255,.25);z-index:4;pointer-events:none;}
.stage canvas{position:absolute;top:0;left:0;width:100%!important;height:100%!important;border-radius:50%;}
#cW{z-index:1;}#cB{z-index:2;pointer-events:none;}
.ptr{position:absolute;top:-2px;left:50%;transform:translateX(-50%);width:0;height:0;border-left:8px solid transparent;border-right:8px solid transparent;border-top:22px solid var(--cyan);filter:drop-shadow(0 0 5px var(--cyan));z-index:5;}
.board{background:var(--panel);border:1px solid rgba(0,229,255,.15);border-radius:12px;padding:10px 14px;display:grid;grid-template-columns:48px 1fr auto;gap:10px;align-items:center;margin-bottom:10px;}
.res-num{font-family:'Orbitron',monospace;font-size:34px;font-weight:900;text-align:center;line-height:1;transition:color .3s;}
.res-num.red{color:var(--red);text-shadow:0 0 14px rgba(255,23,68,.4);}
.res-num.black{color:#aaa;}
.res-num.green{color:var(--green);text-shadow:0 0 14px rgba(0,230,118,.4);}
.res-num.idle{color:var(--ivdim);font-size:24px;}
.res-main{font-size:11px;font-weight:600;color:var(--ivory);}
.res-sub{font-size:9px;color:var(--ivdim);margin-top:2px;}
.bal-lbl{font-size:8px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--ivdim);}
.bal-num{font-family:'Orbitron',monospace;font-size:15px;font-weight:700;color:var(--gold);line-height:1.2;}
.hist{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:10px;min-height:26px;}
.hd{width:26px;height:26px;border-radius:50%;font-size:8px;font-weight:700;display:flex;align-items:center;justify-content:center;}
.hd.red{background:#8b1a1a;color:#f2c4c4;border:1px solid #c03030;}
.hd.black{background:#252525;color:#aaa;border:1px solid #444;}
.hd.green{background:#145220;color:#a8e6b0;border:1px solid #2a7a38;}
.spin-btn{width:100%;padding:15px;border:none;border-radius:14px;font-family:'Orbitron',monospace;font-size:15px;font-weight:900;letter-spacing:.08em;text-transform:uppercase;cursor:pointer;background:linear-gradient(135deg,var(--cyan),#0097a7);color:#001a1f;box-shadow:0 0 18px rgba(0,229,255,.3),0 4px 0 #004d5c;transition:transform .1s,box-shadow .1s,opacity .15s;margin-bottom:10px;}
.spin-btn:active:not([disabled]){transform:translateY(3px);box-shadow:0 0 8px rgba(0,229,255,.2),0 1px 0 #004d5c;}
.spin-btn[disabled]{opacity:.4;cursor:default;}
.bet-panel{background:var(--panel);border:1px solid rgba(255,255,255,.07);border-radius:14px;padding:12px 14px;display:flex;flex-direction:column;gap:10px;margin-bottom:10px;}
.plbl{font-size:8px;font-weight:700;letter-spacing:.15em;text-transform:uppercase;color:var(--ivdim);}
.amt-row{display:flex;gap:6px;align-items:center;}
.qbtn{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);color:var(--ivory);font-family:inherit;font-size:11px;font-weight:700;padding:8px 10px;border-radius:8px;cursor:pointer;}
.qbtn:active{background:rgba(255,255,255,.15);}
.amt-in{flex:1;background:rgba(0,0,0,.5);border:1px solid rgba(0,229,255,.3);color:var(--cyan);font-family:'Orbitron',monospace;font-size:15px;font-weight:700;text-align:center;padding:8px 4px;border-radius:8px;outline:none;}
.bt-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:5px;}
.bt{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.07);color:var(--ivory);font-family:inherit;font-size:11px;font-weight:600;padding:10px 4px;border-radius:8px;cursor:pointer;text-align:center;line-height:1.25;}
.bt .mx{display:block;font-size:8px;color:var(--ivdim);margin-top:2px;}
.bt.sel{background:rgba(0,229,255,.1);border-color:var(--cyan);color:var(--cyan);}
.bt.sel .mx{color:#0097a7;}
.bt.s3{grid-column:1/-1;}
.num-row{display:flex;align-items:center;gap:10px;padding:8px 12px;background:rgba(0,0,0,.35);border:1px solid rgba(0,229,255,.2);border-radius:8px;}
.num-row label{font-size:11px;color:var(--ivdim);}
.num-row input{background:transparent;border:none;color:var(--cyan);font-family:'Orbitron',monospace;font-size:15px;font-weight:700;width:60px;text-align:center;outline:none;}
footer{font-size:9px;color:var(--ivdim);text-align:center;opacity:.3;padding-bottom:4px;}
</style>

<script>
(function(){
'use strict';
const BAL_KEY='nrc_balance',STATS_KEY='nrc_stats',INIT_KEY='nrc_initialized',MISSION_KEY='nrc_missions';
if(!localStorage.getItem(INIT_KEY)){localStorage.setItem(BAL_KEY,'100000');localStorage.setItem(INIT_KEY,'1');}
const getNRC=()=>parseInt(localStorage.getItem(BAL_KEY))||0;
const setNRC=n=>{localStorage.setItem(BAL_KEY,Math.max(0,Math.floor(n)));renderBal();};
const getStats=()=>{try{return JSON.parse(localStorage.getItem(STATS_KEY))||{spins:0,wins:0,loss:0};}catch(e){return{spins:0,wins:0,loss:0};}};
const addStat=(w,l)=>{const s=getStats();s.spins++;s.wins+=w;s.loss+=l;localStorage.setItem(STATS_KEY,JSON.stringify(s));};
const trackM=(key)=>{const m=JSON.parse(localStorage.getItem(MISSION_KEY)||'{}');m[key]=(m[key]||0)+1;localStorage.setItem(MISSION_KEY,JSON.stringify(m));};
const fmt=n=>Math.floor(n).toLocaleString('tr-TR');

const WHEEL=[0,32,15,19,4,21,2,25,17,34,6,27,13,36,11,30,8,23,10,5,24,16,33,1,20,14,31,9,22,18,29,7,28,12,35,3,26];
const REDS=new Set([1,3,5,7,9,12,14,16,18,19,21,23,25,27,30,32,34,36]);
const N=WHEEL.length,STEP=(Math.PI*2)/N;
const SPIN_MS=4500,BALL_OUTER=.91,BALL_POCKET=.77,BALL_FRET=.84;
const numCol=n=>n===0?'green':REDS.has(n)?'red':'black';

let betType='red',spinning=false,rafId=null,history=[],wheelRot=0,ballAngle=-Math.PI/2,ballR=null;

const stage=document.getElementById('stage');
const cvW=document.getElementById('cW'),cvB=document.getElementById('cB');
const ctxW=cvW.getContext('2d'),ctxB=cvB.getContext('2d');
let SZ,CX,CY,R;

function resize(){SZ=stage.clientWidth;cvW.width=cvW.height=SZ;cvB.width=cvB.height=SZ;CX=CY=SZ/2;R=SZ/2-6;}
window.addEventListener('resize',()=>{resize();drawWheel();drawBall(ballAngle,ballR);});

function drawWheel(){
  ctxW.clearRect(0,0,SZ,SZ);
  ctxW.beginPath();ctxW.arc(CX,CY,R,0,Math.PI*2);ctxW.fillStyle='#0a0018';ctxW.fill();
  for(let i=0;i<N;i++){
    const num=WHEEL[i],c=numCol(num);
    const a0=i*STEP+wheelRot-Math.PI/2,a1=a0+STEP,mid=a0+STEP/2;
    ctxW.beginPath();ctxW.moveTo(CX,CY);ctxW.arc(CX,CY,R*.90,a0,a1);ctxW.closePath();
    ctxW.fillStyle=c==='red'?'#6a1010':c==='black'?'#101010':'#104520';ctxW.fill();
    ctxW.beginPath();ctxW.arc(CX,CY,R*.96,a0,a1);ctxW.arc(CX,CY,R*.90,a1,a0,true);ctxW.closePath();
    ctxW.fillStyle=c==='red'?'#8b1a1a':c==='black'?'#1a1a1a':'#1a6030';ctxW.fill();
    ctxW.strokeStyle=c==='red'?'rgba(255,50,50,.35)':c==='black'?'rgba(100,100,100,.15)':'rgba(0,200,80,.35)';ctxW.lineWidth=1.5;ctxW.stroke();
    ctxW.beginPath();ctxW.moveTo(CX+R*.90*Math.cos(a0),CY+R*.90*Math.sin(a0));ctxW.lineTo(CX+R*.97*Math.cos(a0),CY+R*.97*Math.sin(a0));
    ctxW.strokeStyle='rgba(0,229,255,.4)';ctxW.lineWidth=1.5;ctxW.stroke();
    const fs=Math.max(8,R*.08),tx=CX+R*.70*Math.cos(mid),ty=CY+R*.70*Math.sin(mid);
    ctxW.save();ctxW.translate(tx,ty);ctxW.rotate(mid+Math.PI/2);
    ctxW.font=`700 ${fs}px Orbitron,monospace`;ctxW.textAlign='center';ctxW.textBaseline='middle';
    ctxW.shadowColor=c==='red'?'#ff1744':c==='black'?'#aaa':'#00e676';ctxW.shadowBlur=4;
    ctxW.fillStyle=c==='green'?'#69f0ae':'#f0e6ff';ctxW.fillText(num.toString(),0,0);ctxW.restore();
  }
  for(let i=0;i<N;i++){
    const a=i*STEP+wheelRot-Math.PI/2,fx=CX+R*BALL_FRET*Math.cos(a),fy=CY+R*BALL_FRET*Math.sin(a);
    ctxW.save();ctxW.translate(fx,fy);ctxW.rotate(a+Math.PI/4);const ds=R*.02;
    ctxW.beginPath();ctxW.rect(-ds/2,-ds/2,ds,ds);ctxW.fillStyle='#00e5ff';ctxW.shadowColor='#00e5ff';ctxW.shadowBlur=3;ctxW.fill();ctxW.restore();
  }
  ctxW.beginPath();ctxW.arc(CX,CY,R*BALL_OUTER,0,Math.PI*2);ctxW.strokeStyle='rgba(0,229,255,.12)';ctxW.lineWidth=R*.03;ctxW.stroke();
  const hR=R*.13;ctxW.beginPath();ctxW.arc(CX,CY,hR,0,Math.PI*2);ctxW.fillStyle='#0a0018';ctxW.fill();
  ctxW.beginPath();ctxW.arc(CX,CY,hR*.75,0,Math.PI*2);
  const hg=ctxW.createRadialGradient(CX-hR*.25,CY-hR*.25,0,CX,CY,hR*.75);hg.addColorStop(0,'#00e5ff');hg.addColorStop(1,'#004d5c');
  ctxW.fillStyle=hg;ctxW.shadowColor='#00e5ff';ctxW.shadowBlur=10;ctxW.fill();ctxW.shadowBlur=0;
  ctxW.beginPath();ctxW.arc(CX,CY,hR*.22,0,Math.PI*2);ctxW.fillStyle='#0a0018';ctxW.fill();
}

function drawBall(angle,r){
  ctxB.clearRect(0,0,SZ,SZ);if(r===null)return;
  const br=Math.max(5,R*.055),bx=CX+r*Math.cos(angle),by=CY+r*Math.sin(angle);
  ctxB.beginPath();ctxB.arc(bx+br*.5,by+br*.5,br*1.1,0,Math.PI*2);ctxB.fillStyle='rgba(0,0,0,.5)';ctxB.fill();
  const g=ctxB.createRadialGradient(bx-br*.4,by-br*.45,br*.04,bx,by,br);
  g.addColorStop(0,'#ffffff');g.addColorStop(.4,'#c0d8ff');g.addColorStop(1,'#304060');
  ctxB.beginPath();ctxB.arc(bx,by,br,0,Math.PI*2);ctxB.shadowColor='rgba(0,229,255,.5)';ctxB.shadowBlur=6;ctxB.fillStyle=g;ctxB.fill();ctxB.shadowBlur=0;
  ctxB.beginPath();ctxB.arc(bx-br*.3,by-br*.35,br*.2,0,Math.PI*2);ctxB.fillStyle='rgba(255,255,255,.8)';ctxB.fill();
}

function doSpin(targetNum,onDone){
  const idx=WHEEL.indexOf(targetNum);
  const spins=8+Math.random()*5;
  const baseRot=-(idx+.5)*STEP;
  let finalRot=baseRot;
  while(finalRot<wheelRot+spins*Math.PI*2-Math.PI)finalRot+=Math.PI*2;
  const startRot=wheelRot,ballStartAngle=ballAngle,ballRevs=spins*1.8;
  const t0=performance.now();
  function tick(now){
    const elapsed=now-t0,raw=Math.min(1,elapsed/SPIN_MS);
    wheelRot=startRot+(finalRot-startRot)*(1-Math.pow(1-raw,5));
    drawWheel();
    let bAngle,bR;
    if(raw<.65){const e1=1-Math.pow(1-raw/.65,2);bAngle=ballStartAngle-ballRevs*.65*Math.PI*2*e1;bR=R*BALL_OUTER;}
    else if(raw<.85){const t2=(raw-.65)/.20;const a1e=ballStartAngle-ballRevs*.65*Math.PI*2*(1-Math.pow(.35,2));bAngle=a1e-ballRevs*.20*Math.PI*2*t2*.3;const jitter=Math.sin(t2*Math.PI*8)*R*.016*(1-t2);bR=R*BALL_OUTER-(R*BALL_OUTER-R*BALL_FRET)*t2+jitter;}
    else{const t3=(raw-.85)/.15,e3=1-Math.pow(1-t3,3);const fSeg=idx*STEP+finalRot-Math.PI/2+STEP/2;const a1e=ballStartAngle-ballRevs*.65*Math.PI*2*(1-Math.pow(.35,2));const a2e=a1e-ballRevs*.20*Math.PI*2*.3;bAngle=a2e+(fSeg-a2e)*e3;bR=R*BALL_FRET+(R*BALL_POCKET-R*BALL_FRET)*e3;}
    if(raw<1){drawBall(bAngle,bR);rafId=requestAnimationFrame(tick);}
    else{
      wheelRot=finalRot;drawWheel();
      const pa=idx*STEP+finalRot-Math.PI/2+STEP/2;ballAngle=pa;ballR=R*BALL_POCKET;drawBall(ballAngle,ballR);
      spinning=false;document.getElementById('spinBtn').disabled=false;onDone();
    }
  }
  rafId=requestAnimationFrame(tick);
}

function evaluate(n,type){
  const c=numCol(n);
  if(type==='red'&&c==='red')return 2;if(type==='black'&&c==='black')return 2;
  if(type==='even'&&n!==0&&n%2===0)return 2;if(type==='odd'&&n!==0&&n%2!==0)return 2;
  if(type==='low'&&n>=1&&n<=18)return 2;if(type==='high'&&n>=19&&n<=36)return 2;
  if(type==='d1'&&n>=1&&n<=12)return 3;if(type==='d2'&&n>=13&&n<=24)return 3;if(type==='d3'&&n>=25&&n<=36)return 3;
  if(type==='num'){const p=parseInt(document.getElementById('numPick').value)||0;if(n===p)return 36;}
  return 0;
}

let ac;const getAC=()=>{if(!ac)ac=new(window.AudioContext||window.webkitAudioContext)();return ac;};
function tone(f,d,t='sine',g=.15,s=0){try{const a=getAC(),o=a.createOscillator(),gn=a.createGain();o.connect(gn);gn.connect(a.destination);o.type=t;o.frequency.value=f;gn.gain.setValueAtTime(g,a.currentTime+s);gn.gain.exponentialRampToValueAtTime(.001,a.currentTime+s+d);o.start(a.currentTime+s);o.stop(a.currentTime+s+d);}catch(e){}}
function playBallRoll(){for(let i=0;i<6;i++)tone(800+i*30,.04,'sine',.05,i*.1);}
function playWin(amt){amt>5000?[523,659,784,1047].forEach((f,i)=>tone(f,.15,'square',.2,i*.1)):tone(523,.3,'sine',.18);}
function playLose(){tone(200,.2,'sawtooth',.08);}

function renderBal(){const b=getNRC();document.getElementById('balNum').textContent=fmt(b);document.getElementById('hBal').textContent=fmt(b)+' NRC';}
function pushHistory(n){history.unshift(n);if(history.length>14)history.pop();document.getElementById('histDots').innerHTML=history.map(x=>`<div class="hd ${numCol(x)}">${x}</div>`).join('');}
function showResult(n,mult,amount){
  const c=numCol(n),label=c==='red'?'Kırmızı':c==='black'?'Siyah':'Yeşil';
  const el=document.getElementById('rNum');el.className='res-num '+c;el.textContent=n;
  const main=document.getElementById('rMain'),sub=document.getElementById('rSub');
  if(mult>0){main.textContent=`+${fmt(amount*mult)} NRC — Kazandın!`;sub.textContent=`${n} · ${label} · ${mult}×`;}
  else{main.textContent='Kazanamadın';sub.textContent=`${n} · ${label}`;}
}

document.querySelectorAll('.qbtn').forEach(btn=>btn.addEventListener('click',()=>{document.getElementById('betIn').value=parseInt(btn.dataset.v);}));
document.getElementById('btGrid').addEventListener('click',e=>{
  const btn=e.target.closest('[data-t]');if(!btn)return;
  betType=btn.dataset.t;
  document.querySelectorAll('.bt').forEach(b=>b.classList.remove('sel'));btn.classList.add('sel');
  document.getElementById('numRow').style.display=betType==='num'?'flex':'none';
});
document.getElementById('spinBtn').addEventListener('click',()=>{
  if(spinning)return;
  const amount=parseInt(document.getElementById('betIn').value)||0;
  if(amount<10){document.getElementById('rMain').textContent='Min bahis 10 NRC';return;}
  const bal=getNRC();if(amount>bal){document.getElementById('rMain').textContent='Yetersiz bakiye';return;}
  setNRC(bal-amount);spinning=true;document.getElementById('spinBtn').disabled=true;
  document.getElementById('rMain').textContent='🎡 Döndürülüyor...';
  if(ballR===null)ballR=R*BALL_OUTER;
  playBallRoll();
  const target=Math.floor(Math.random()*37);
  doSpin(target,()=>{
    const mult=evaluate(target,betType);
    const win=mult>0?amount*mult:0,loss=mult>0?0:amount;
    if(win>0)setNRC(getNRC()+win);
    addStat(win,loss);trackM('rulet_spins');pushHistory(target);showResult(target,mult,amount);
    mult>0?playWin(win):playLose();
    localStorage.setItem('nrc_last_result',JSON.stringify({win,ts:Date.now()}));
  });
});

resize();renderBal();drawWheel();drawBall(ballAngle,ballR);
})();
</script>
